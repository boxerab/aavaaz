name = "aavaaz-transcribe"
main = "worker.js"
compatibility_date = "2024-12-01"

[ai]
binding = "AI"

# Optional R2 bucket for storing transcripts.
# Uncomment and create the bucket: wrangler r2 bucket create aavaaz-transcripts
# [[r2_buckets]]
# binding = "TRANSCRIPTS"
# bucket_name = "aavaaz-transcripts"

[vars]
AAVAAZ_OUTPUT_FORMAT = "json"
AAVAAZ_ENABLE_FORMAT = "1"
AAVAAZ_ENABLE_PII = "0"
# AAVAAZ_API_KEY = ""   # Set via: wrangler secret put AAVAAZ_API_KEY
