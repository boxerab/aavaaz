name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint
        run: ruff check aavaaz/ tests/

      - name: Test
        run: pytest -v

  infra:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3

      - name: Terraform validate
        run: |
          for d in terraform terraform-lambda terraform-saas terraform-serverless; do
            echo "== deploy/$d =="
            terraform -chdir="deploy/$d" init -backend=false -input=false
            terraform -chdir="deploy/$d" validate
          done

      - uses: azure/setup-helm@v4

      - name: Helm lint and template
        run: |
          helm lint deploy/helm/aavaaz
          helm template aavaaz deploy/helm/aavaaz
