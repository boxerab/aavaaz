apiVersion: apps/v1
kind: Deployment
metadata:
  name: aavaaz-dashboard
  labels:
    app: aavaaz-dashboard
spec:
  replicas: 2
  selector:
    matchLabels:
      app: aavaaz-dashboard
  template:
    metadata:
      labels:
        app: aavaaz-dashboard
    spec:
      containers:
        - name: dashboard
          # NEXT_PUBLIC_* are inlined into the static export at build time, so
          # they are baked into this image via docker build args, not set here.
          image: <ACCOUNT>.dkr.ecr.us-east-1.amazonaws.com/aavaaz-dashboard:latest
          ports:
            - containerPort: 3000
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: aavaaz-dashboard
spec:
  selector:
    app: aavaaz-dashboard
  ports:
    - port: 80
      targetPort: 3000
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: aavaaz-dashboard
  annotations:
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/certificate-arn: "<ACM_CERT_ARN>"
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTPS": 443}]'
    alb.ingress.kubernetes.io/ssl-redirect: "443"
spec:
  ingressClassName: alb
  rules:
    - host: app.aavaaz.dev
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: aavaaz-dashboard
                port:
                  number: 80
