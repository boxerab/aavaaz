# Karpenter NodePool for GPU workloads
# Provisions g5.xlarge (1x A10G, 24GB VRAM) on demand
# Scales to zero when no GPU pods are pending
apiVersion: karpenter.sh/v1beta1
kind: NodePool
metadata:
  name: gpu-transcription
spec:
  template:
    metadata:
      labels:
        workload: gpu-transcription
    spec:
      requirements:
        - key: kubernetes.io/arch
          operator: In
          values: ["amd64"]
        - key: karpenter.k8s.aws/instance-category
          operator: In
          values: ["g"]
        - key: karpenter.k8s.aws/instance-family
          operator: In
          values: ["g5"]
        - key: karpenter.k8s.aws/instance-size
          operator: In
          values: ["xlarge", "2xlarge"]
        - key: kubernetes.io/os
          operator: In
          values: ["linux"]
        - key: karpenter.sh/capacity-type
          operator: In
          values: ["on-demand"]
      nodeClassRef:
        name: gpu-nodes
  limits:
    cpu: "64"
    memory: "256Gi"
    nvidia.com/gpu: "8"
  disruption:
    consolidationPolicy: WhenUnderutilized
    consolidateAfter: 5m
---
apiVersion: karpenter.k8s.aws/v1beta1
kind: EC2NodeClass
metadata:
  name: gpu-nodes
spec:
  amiFamily: AL2
  role: "KarpenterNodeRole-aavaaz-saas"
  subnetSelectorTerms:
    - tags:
        karpenter.sh/discovery: "aavaaz-saas"
  securityGroupSelectorTerms:
    - tags:
        karpenter.sh/discovery: "aavaaz-saas"
  blockDeviceMappings:
    - deviceName: /dev/xvda
      ebs:
        volumeSize: 100Gi
        volumeType: gp3
        deleteOnTermination: true
